<section class="portfolio-section marketing-section" id="marketing">
    <h2 class="section-title">Marketing Collateral</h2>
    <div class="portfolio-grid" id="marketing-grid">
        <!-- Auto-populated by script below -->
    </div>
</section>
<script>
(function() {
    var MAX = 100;
    var BASE = 'assets/images/';
    var grid = document.getElementById('marketing-grid');
    if (!grid) return;

    var loaded = 0;
    var checked = 0;

    function done() {
        checked++;
        if (checked === MAX && loaded === 0) {
            grid.innerHTML = '<p style="opacity:0.5;padding:20px;">No images found.</p>';
        }
    }

    for (var i = 1; i <= MAX; i++) {
        (function(n) {
            var img = new Image();
            img.onload = function() {
                loaded++;
                var card = document.createElement('div');
                card.className = 'portfolio-card';
                var image = document.createElement('img');
                image.src = BASE + n + '.png';
                image.alt = '';
                image.loading = 'lazy';
                card.appendChild(image);
                // Insert in numeric order
                var cards = grid.querySelectorAll('.portfolio-card');
                var inserted = false;
                for (var j = 0; j < cards.length; j++) {
                    var existingN = parseInt(cards[j].dataset.n);
                    if (n < existingN) {
                        grid.insertBefore(card, cards[j]);
                        inserted = true;
                        break;
                    }
                }
                if (!inserted) grid.appendChild(card);
                card.dataset.n = n;
                done();
            };
            img.onerror = function() { done(); };
            img.src = BASE + n + '.png';
        })(i);
    }
})();
</script>
