<section class="portfolio-section marketing-section" id="marketing">
    <h2 class="section-title">Marketing Collateral</h2>
    <div class="portfolio-grid" id="marketing-grid">
        <!-- AUTO-LOADED by script below -->
    </div>
</section>
<script>
(function(){
    var grid = document.getElementById('marketing-grid');
    if(!grid) return;
    var max = 100, loaded = 0;
    function tryLoad(n){
        var img = new Image();
        img.onload = function(){
            var card = document.createElement('div');
            card.className = 'portfolio-card';
            var i = document.createElement('img');
            i.src = 'assets/images/' + n + '.png';
            i.alt = '';
            i.loading = 'lazy';
            card.appendChild(i);
            grid.appendChild(card);
        };
        img.onerror = function(){};
        img.src = 'assets/images/' + n + '.png';
    }
    for(var n = 1; n <= max; n++){ tryLoad(n); }
})();
</script>
