    <style>
        /* ===========================
           LOADING SCREEN
        =========================== */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #000000;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            transition: opacity 0.9s cubic-bezier(0.4,0,0.2,1), visibility 0.9s cubic-bezier(0.4,0,0.2,1);
        }
        #loading-screen.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loading-name {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.03em;
            text-transform: uppercase;
        }
        .loading-sig {
            font-family: "Mrs Saint Delafield", cursive;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: rgba(255,255,255,0.6);
        }
        .loading-bar-wrap {
            width: min(280px, 70vw);
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #64689c, #c7506d);
            border-radius: 2px;
            transition: width 0.4s ease;
        }
        .loading-dots {
            display: flex;
            gap: 8px;
        }
        .loading-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            animation: dotPulse 1.4s infinite ease-in-out;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Hide main content until loaded — loader stays visible immediately */
        body > *:not(#loading-screen):not(script):not(style) {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        body.loaded > *:not(#loading-screen):not(script):not(style) {
            opacity: 1;
            visibility: visible;
        }

        /* ===========================
           DESKTOP THEME TOGGLE (existing metallic ring)
        =========================== */
        @property --gradient_rotate {
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }

        #theme-toggle {
            --gradient_rotate: 0deg;
            --border_width: 0.3rem;
            --metal_01: rgb(200 200 220 / 1.0);
            --metal_02: rgb(160 160 180 / 1.0);
            --metal_03: rgb(120 120 140 / 1.0);
            --metal_04: rgb(080 080 100 / 1.0);
            --metal_05: rgb(040 040 060 / 1.0);
            --metal_06: rgb(010 010 010 / 1.0);

            position: relative;
            cursor: pointer;
            padding: 0.8rem;
            background: linear-gradient(0deg,
                        rgb(010 010 010 / 1.0) 10%,
                        rgb(040 040 050 / 1.0)) padding-box,

    // ===========================
    // LOADING SCREEN
    // ===========================
    (function() {
        const screen = document.getElementById('loading-screen');
        const bar = document.getElementById('loading-bar');
        let progress = 0;
        let hidden = false;
        let contentReady = false;
        let themeReady = false;

        // Reveal main content (loader stays visible until fade)
        function revealBody() {
            document.body.classList.add('loaded');
        }

        function setProgress(val) {
            progress = Math.max(progress, Math.min(100, val));
            if (bar) bar.style.width = progress + '%';
        }

        const MIN_DISPLAY = 5000; // minimum 5 seconds always
        const startTime = Date.now();

        function tryHide() {
            if (hidden || !contentReady || !themeReady) return;
            hidden = true;
            setProgress(100);

            const elapsed = Date.now() - startTime;
            const remaining = Math.max(0, MIN_DISPLAY - elapsed);

            setTimeout(() => {
                // 1. Reveal body silently BEHIND the loader (no flash)
                revealBody();
                // 2. Give browser 200ms to fully paint the site behind loader
                setTimeout(() => {
                    // 3. Now fade loader out smoothly
                    screen.classList.add('hide');
                    // 4. Remove from DOM after fade completes
                    setTimeout(() => { screen.style.display = 'none'; }, 900);
                }, 200);
            }, remaining);
        }

        // Progress fills smoothly across the full 3 seconds
        setProgress(8);
        setTimeout(() => setProgress(20), 400);
        setTimeout(() => setProgress(38), 900);
        setTimeout(() => setProgress(55), 1500);
        setTimeout(() => setProgress(72), 2000);
        setTimeout(() => setProgress(85), 2500);
        setTimeout(() => setProgress(93), 2800);

        // Step 1: HTML content loaded
        document.addEventListener('content-loaded', () => {
            contentReady = true;
            setProgress(92);
            tryHide();
        });

        // Step 2: Theme CSS + JS fully loaded
        document.addEventListener('theme-ready', () => {
            themeReady = true;
            setProgress(97);
            tryHide();
        });

        // Absolute fallback — never leave user stuck
        setTimeout(() => {
            contentReady = true;
            themeReady = true;
            tryHide();
        }, 8000);
    })();

    // ===========================
    // MOBILE BOTTOM NAV
    // ===========================
    (function() {
        if (window.innerWidth > 767) return;

        const moreBtn = document.getElementById('mobile-more-btn');
        const moreMenu = document.getElementById('mobile-more-menu');
        const navItems = document.querySelectorAll('.mobile-nav-item[data-section]');

        // Sections for scroll tracking (bottom-first order)
        const sections = [
            { key: 'contact',  id: 'contact' },
            { key: 'gallery',  id: 'marketing' },
            { key: 'work',     id: 'animation' },
            { key: 'about',    id: 'about' },
            { key: 'home',     id: 'home' },
        ];

        function setActive(key) {
            navItems.forEach(item => {
                item.classList.toggle('active', item.dataset.section === key);
            });
        }

        function onScroll() {
            const scrollY = window.scrollY + window.innerHeight / 3;
            for (const s of sections) {
                const el = document.getElementById(s.id);
                if (el && el.offsetTop <= scrollY) {
                    setActive(s.key);
                    return;
                }
            }
            setActive('home');
        }

        window.addEventListener('scroll', onScroll, { passive: true });
        // Re-run after content loads
        document.addEventListener('content-loaded', () => {
            setTimeout(onScroll, 100);
        });

        // More toggle
        if (moreBtn && moreMenu) {
            moreBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const isOpen = moreMenu.classList.contains('show');
                moreMenu.classList.toggle('show', !isOpen);
                moreBtn.setAttribute('aria-expanded', (!isOpen).toString());
                moreBtn.classList.toggle('active', !isOpen);
            });

            document.addEventListener('click', () => {
                moreMenu.classList.remove('show');
                moreBtn.setAttribute('aria-expanded', 'false');
                moreBtn.classList.remove('active');
            });

            moreMenu.querySelectorAll('.mobile-more-item').forEach(link => {
                link.addEventListener('click', () => {
                    moreMenu.classList.remove('show');
                    moreBtn.setAttribute('aria-expanded', 'false');
                    moreBtn.classList.remove('active');
                });
            });
        }
    })();

    // ===========================
    // MOBILE THEME TOGGLE SYNC
    // ===========================
    (function() {
        const mobileToggle = document.getElementById('mobile-theme-toggle');
        const desktopToggle = document.getElementById('theme-toggle');
        const bottomNav = document.getElementById('mobile-bottom-nav');
        const moreMenu = document.getElementById('mobile-more-menu');

        function applyTheme(theme) {
            if (!mobileToggle) return;
            if (theme === 'light') {
                mobileToggle.classList.add('light-toggle');
                mobileToggle.classList.remove('dark-toggle');
                if (bottomNav) { bottomNav.classList.add('light-nav'); bottomNav.classList.remove('dark-nav'); }
                if (moreMenu) { moreMenu.classList.add('light-more'); moreMenu.classList.remove('dark-more'); }
            } else {
                mobileToggle.classList.add('dark-toggle');
                mobileToggle.classList.remove('light-toggle');
                if (bottomNav) { bottomNav.classList.add('dark-nav'); bottomNav.classList.remove('light-nav'); }
                if (moreMenu) { moreMenu.classList.add('dark-more'); moreMenu.classList.remove('light-more'); }
            }
        }

        // Init
        applyTheme(localStorage.getItem('vivash-theme') || 'dark');

        // Mobile toggle triggers desktop toggle
        if (mobileToggle && desktopToggle) {
            mobileToggle.addEventListener('click', () => {
                desktopToggle.click();
                setTimeout(() => applyTheme(localStorage.getItem('vivash-theme') || 'dark'), 60);
            });
        }

        // Desktop toggle syncs mobile
        if (desktopToggle) {
            desktopToggle.addEventListener('click', () => {
                setTimeout(() => applyTheme(localStorage.getItem('vivash-theme') || 'dark'), 60);
            });
        }
    })();

    // ===========================
    // BACK TO TOP BUTTON (mobile)
    // ===========================
    (function() {
        const btn = document.getElementById('back-to-top');
        if (!btn || window.innerWidth > 767) return;
        btn.style.display = 'flex';

        window.addEventListener('scroll', () => {
            if (window.scrollY > 600) {
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            } else {
                btn.style.opacity = '0';
                btn.style.pointerEvents = 'none';
            }
        }, { passive: true });

        btn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    })();

    // ===========================
    // MOBILE SCROLL ARROW
    // ===========================
    (function() {
        const arrow = document.getElementById('mobile-scroll-arrow');
        if (!arrow || window.innerWidth > 768) return;
        setTimeout(() => arrow.classList.add('visible'), 2500);
        arrow.addEventListener('click', () => {
            const el = document.getElementById('about') || document.getElementById('about-section')
                     || document.querySelector('.portfolio-section, section');
            if (el) el.scrollIntoView({ behavior: 'smooth' });
            arrow.classList.remove('visible');
        });
        // Hide after user scrolls
        window.addEventListener('scroll', () => {
            if (window.scrollY > 100) arrow.classList.remove('visible');
        }, { passive: true, once: true });
    })();

    // ===========================
    // ===========================
    // NAV LOGO ANIMATION — char by char morph
    // ===========================
    (function() {
        const words = ['ingh', 'tudio'];
        let currentIndex = 0;

        const wrap = document.querySelector('.nav-brand-suffix-wrap');
        if (!wrap) return;

        // Clear and build individual letter spans
        function buildSpans(word) {
            wrap.innerHTML = '';
            return word.split('').map(char => {
                const s = document.createElement('span');
                s.className = 'nav-brand-char';
                s.textContent = char;
                wrap.appendChild(s);
                return s;
            });
        }

        // Animate out current chars, then animate in new chars
        function morph(fromWord, toWord) {
            const maxLen = Math.max(fromWord.length, toWord.length);
            const fromSpans = wrap.querySelectorAll('.nav-brand-char');

            // Step 1: animate each existing char out one by one
            // Step 2: swap text + animate each char in
            let delay = 0;
            const charDelay = 60; // ms between each char

            fromSpans.forEach((span, i) => {
                setTimeout(() => {
                    span.classList.add('char-out');
                }, delay + i * charDelay);
            });

            const totalOutDuration = delay + fromWord.length * charDelay + 200;

            setTimeout(() => {
                // Rebuild with new word chars, all hidden
                const newSpans = buildSpans(toWord);
                newSpans.forEach(s => s.classList.add('char-in'));

                // Animate each in one by one
                newSpans.forEach((span, i) => {
                    setTimeout(() => {
                        span.classList.remove('char-in');
                        span.classList.add('char-active');
                    }, i * charDelay);
                });
            }, totalOutDuration);
        }

        // Init first word
        const initSpans = buildSpans(words[0]);
        initSpans.forEach((s, i) => {
            setTimeout(() => {
                s.classList.add('char-active');
            }, i * 60);
        });

        // Cycle
        setInterval(() => {
            const next = (currentIndex + 1) % words.length;
            morph(words[currentIndex], words[next]);
            currentIndex = next;
        }, 3000);
    })();

    // REMOVE MIDDLE ARROW
    // ===========================
    (function() {
        ['.scroll-down','.hero-arrow','.down-arrow','.scroll-btn','.scroll-button',
         '#scroll-down','#hero-arrow','#down-arrow'].forEach(sel => {
            const el = document.querySelector(sel);
            if (el) el.remove();
        });
    })();
    </script>
